# A generic, single database configuration.

[alembic]
# path to migration scripts — relative to this file
script_location = db/migrations

# Template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend — allows importing VibeFlow modules
prepend_sys_path = .

# Timezone for migration timestamp
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# The database URL is loaded dynamically in env.py from .env / env vars.
# Do NOT hardcode it here.
sqlalchemy.url =


[post_write_hooks]
# Optionally run ruff after generating migration files
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
