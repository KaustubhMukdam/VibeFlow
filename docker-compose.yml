services:
  db:
    image: postgres:15-alpine
    container_name: vibeflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: vibeflow_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      # Tell the API to connect to the 'db' service in Docker, not localhost
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - LOCAL_MUSIC_DIR=/app/music_library
    volumes:
      - .:/app
      # Map your host music library into the container
      - ./music_library:/app/music_library
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: